<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Document</title>
  </head>
  <body>
    <h3>Pesquisa no Google</h3>
    <form action="https://www.google.com/search">
      <label for="q">O que deseja procurar?</label>
      <input
        type="email"
        id="q"
        name="q"
        placeholder="Pesquise aqui"
        required
      />
      <input type="submit" value="Pesquisar" />
    </form>
  </body>
</html>
